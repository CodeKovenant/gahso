kind = "web"
previewPath = "/"
title = "GAHSO"
version = "1.0.0"
id = "artifacts/gahso"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23164

[services.development]
run = "pnpm --filter @workspace/gahso run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gahso", "run", "build" ]
publicDir = "artifacts/gahso/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23164"
BASE_PATH = "/"
