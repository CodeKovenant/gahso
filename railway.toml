[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/gahso run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30

[deploy.environmentVariables]
NODE_ENV = "production"
